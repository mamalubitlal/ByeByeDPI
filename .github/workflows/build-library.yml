name: Build Library

on:
  push:
    branches: [ main, master ]
    paths:
      - 'library/**'
      - 'app/src/main/cpp/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'library/**'
      - 'app/src/main/cpp/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build library
      run: ./gradlew :library:assembleRelease :library:assembleDebug
      
    - name: Upload library artifacts
      uses: actions/upload-artifact@v4
      with:
        name: library-aar
        path: |
          library/build/outputs/aar/*.aar
        retention-days: 30
        
    - name: Run library unit tests
      run: ./gradlew :library:testReleaseUnitTest
      
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: library/build/reports/tests/
        retention-days: 7

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Download library artifact
      uses: actions/download-artifact@v4
      with:
        name: library-aar
        path: library/build/outputs/aar/
        
    - name: Generate documentation
      run: |
        echo "# ByeDPI Library Build" > BUILD_INFO.md
        echo "" >> BUILD_INFO.md
        echo "Build completed: $(date)" >> BUILD_INFO.md
        echo "Commit: ${{ github.sha }}" >> BUILD_INFO.md
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          library/build/outputs/aar/*.aar
        body_path: BUILD_INFO.md
