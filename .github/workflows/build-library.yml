name: Build Library

on:
  push:
    branches: [ main, master ]
    paths:
      - 'library/**'
      - 'app/src/main/cpp/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'library/**'
      - 'app/src/main/cpp/**'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build library
      run: ./gradlew :library:assembleRelease :library:assembleDebug
      
    - name: Run library unit tests
      run: ./gradlew :library:testReleaseUnitTest
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: library-aar
        path: library/build/outputs/aar/*.aar
        retention-days: 30
      
    - name: Publish to GitHub Packages
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      run: ./gradlew :library:publishReleasePublicationToGitHubPackagesRepository
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Create Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v1
      with:
        files: library/build/outputs/aar/*.aar
        body: |
          ## ByeDPI Library
          
          ### Maven (GitHub Packages)
          ```kotlin
          implementation("io.github.romanvht.byedpi:library:1.0.${{ github.run_number }}")
          ```
          See README for full setup instructions.
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: ByeDPI Library v1.0.${{ github.run_number }}
        files: |
          library/build/outputs/aar/*.aar
        body: |
          ## ByeDPI Library v1.0.${{ github.run_number }}
          
          ### Installation (GitHub Packages)
          ```kotlin
          // settings.gradle.kts
          dependencyResolutionManagement {
              repositories {
                  maven {
                      url = uri("https://maven.pkg.github.com/${{ github.repository }}")
                      credentials {
                          username = "YOUR_GITHUB_USERNAME"
                          password = "YOUR_GITHUB_TOKEN"
                      }
                  }
              }
          }
          
          // build.gradle.kts
          dependencies {
              implementation("io.github.romanvht.byedpi:library:1.0.${{ github.run_number }}")
          }
          ```
          
          ### Direct Download
          - `library-release.aar` - Release build (minified)
          - `library-debug.aar` - Debug build
          
          Commit: ${{ github.sha }}
